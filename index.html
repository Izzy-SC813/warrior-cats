<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Warrior Cats</title>

  <!-- local stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- Three.js (CDN) - must load before game.js so THREE is defined -->
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="uiOverlay">
    <!-- customization UI -->
    <div id="customizationMenu">
      <div class="customization-container">
        <!-- Left: Cat Preview -->
        <div class="cat-preview-section">
          <h2>Your Warrior</h2>
          <div class="preview-box">
            <canvas id="previewCanvas" width="300" height="350"></canvas>
          </div>
          <div class="cat-name-display" id="catNamePreview">Fire-kit</div>
        </div>

        <!-- Right: Customization Options -->
        <div class="customization-options">
          <h2>Design Your Warrior</h2>
          
          <div class="form-group">
            <label for="nameInput">Warrior Prefix:</label>
            <input type="text" id="nameInput" placeholder="e.g., Fire, Bramble" value="Fire">
          </div>

          <div class="form-group">
            <p class="menu-label">🏕️ Choose Your Clan:</p>
            <div class="selection-grid clan-grid">
              <button class="clan-btn tc" onclick="selectClan('ThunderClan')">⚡ ThunderClan</button>
              <button class="clan-btn rc" onclick="selectClan('RiverClan')">💧 RiverClan</button>
              <button class="clan-btn wc" onclick="selectClan('WindClan')">🌬️ WindClan</button>
              <button class="clan-btn sc" onclick="selectClan('ShadowClan')">🌙 ShadowClan</button>
            </div>
          </div>

          <div class="form-group">
            <p class="menu-label">🎨 Fur Color:</p>
            <div class="selection-grid">
              <button class="color-btn" onclick="changeFur('orange')" style="background: #d4a373;">Ginger</button>
              <button class="color-btn" onclick="changeFur('gray')" style="background: #6b7782;">Slate Gray</button>
              <button class="color-btn" onclick="changeFur('brown')" style="background: #544336;">Brown</button>
              <button class="color-btn" onclick="changeFur('black')" style="background: #1c1c1c;">Black</button>
              <button class="color-btn" onclick="changeFur('white')" style="background: #edebe6;">White</button>
              <button class="color-btn" onclick="changeFur('silver')" style="background: #a1aab3;">Silver</button>
            </div>
            <button class="special-btn" onclick="changeFur('tortie')">🌈 Tortoiseshell</button>
          </div>

          <div class="form-group">
            <p class="menu-label">✨ Markings:</p>
            <div class="selection-grid">
              <button onclick="changeMarkings('solid')">Solid Coat</button>
              <button onclick="changeMarkings('socks')">White Socks</button>
              <button onclick="changeMarkings('tabby')">Tabby Face</button>
              <button onclick="changeMarkings('point')">Siamese Point</button>
            </div>
          </div>

          <div class="form-group">
            <p class="menu-label">💇 Coat Length:</p>
            <div class="selection-grid">
              <button onclick="changeLength('short')">Short Hair</button>
              <button onclick="changeLength('long')">Long/Fluffy</button>
            </div>
          </div>

          <div class="form-group">
            <p class="menu-label">👁️ Eye Color:</p>
            <div class="selection-grid">
              <button class="eye-btn" onclick="changeEyes('amber')" style="background: #d97e18;">Amber</button>
              <button class="eye-btn" onclick="changeEyes('green')" style="background: #448c46;">Green</button>
              <button class="eye-btn" onclick="changeEyes('blue')" style="background: #5ca9e6;">Ice Blue</button>
            </div>
          </div>

          <button id="startBtn" onclick="startGame()">⚔️ Enter the Forest</button>
        </div>
      </div>
    </div>

    <div id="gameStats" style="display:none;">
      <div class="stat-card">
        <h3 id="catName">Name: Loading...</h3>
        <p id="catClan" style="font-weight: bold; color: #aed1b4;">Clan: Loading...</p>
        <p id="catRank">Rank: Kit</p>
        <p id="catAge">Age: 0 Moons</p>
        <p id="catHP" style="color: #ff6b6b; font-weight: bold;">Health: 100%</p>
        <p id="freshKill" style="color: #ffd269; font-weight: bold;">Fresh-Kill Pile: 0</p>
      </div>
      <div class="inventory-card">
        <h4>Medicine Bag</h4>
        <ul id="herbList"><li>Empty</li></ul>
        <p style="font-size: 11px; margin-top: 10px; color: #a3b899; line-height: 1.2;">[SPACEBAR] to catch prey or claw nearby rogues!</p>
      </div>
      <div id="dialogueBox"></div>
    </div>
  </div>

  <!-- game script (after Three.js) -->
  <script src="games.js"></script>
</body>
</html>
